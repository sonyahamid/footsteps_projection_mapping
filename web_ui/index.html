<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Mapping Web UI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #floor-canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 1000px;
            height: 1000px;
            pointer-events: none;
        }
        .footprint-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="floor-canvas">
        <svg id="svg-layer"></svg>
        <div id="entities-layer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>

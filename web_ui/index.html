<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Mapping Web UI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #floor-canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            width: 1000px;
            height: 1000px;
            pointer-events: none;
            /* Hide the grid for production */
        }
        .footprint-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .debug-grid {
            background-size: 100px 100px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            border: 2px solid rgba(255, 0, 0, 0.5);
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="floor-canvas">
        <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"></svg>
        <div id="entities-layer"></div>
    </div>

    <script src="spline_helper.js"></script>
    <script src="app.js"></script>
</body>
</html>
